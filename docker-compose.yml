name: solar-optimizer-copy
services:
  # ─── Frontend (React + Vite) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: solar-frontend-copy
    ports:
      - "5174:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
    environment:
      - VITE_API_URL=http://localhost:8001
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - solar-net

  # ─── Backend (FastAPI + Python) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solar-backend-copy
    ports:
      - "8001:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=http://localhost:5174
    restart: unless-stopped
    networks:
      - solar-net

networks:
  solar-net:
    driver: bridge
